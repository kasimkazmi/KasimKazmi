name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write   # allow GITHUB_TOKEN to push

jobs:
  generate:
    runs-on: ubuntu-latest
    name: Generate Snake Game from Contributions
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        # remove token override so the default GITHUB_TOKEN is used and credentials are persisted
        # with persist-credentials true (default). Do NOT override with an incorrect or limited token.

      - uses: Platane/snk@v3
        with:
          github_user_name: kasimkazmi
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg

      - name: Push to output branch
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git checkout -b output 2>/dev/null || git checkout output
          git add dist/
          git commit -m "Update snake animation" || exit 0
          # the checkout action has persisted credentials for GITHUB_TOKEN,
          # so a plain git push will authenticate with the token
          git push origin output