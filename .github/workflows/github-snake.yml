name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *"  # every 24 hours
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    name: Generate Snake Game from Contributions
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}
      - uses: Platane/snk@v3
        with:
          github_user_name: kasimkazmi
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg
      - name: Push to output branch
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git checkout -b output 2>/dev/null || git checkout output
          git add dist/
          git commit -m "Update snake animation" || exit 0
          git remote set-url origin https://${{ secrets.GH_TOKEN }}@github.com/kasimkazmi/KasimKazmi.git
          git push origin output